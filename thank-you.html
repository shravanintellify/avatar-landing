<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2;url=https://avatarpoc.streamlit.app/">
    <title>You're In! - Avatar Video Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .box {
            max-width: 420px;
        }

        .checkmark {
            font-size: 3.5em;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        p {
            opacity: 0.9;
            margin-bottom: 25px;
            font-size: 1.05em;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        a.manual-link {
            display: inline-block;
            margin-top: 25px;
            color: white;
            text-decoration: underline;
            font-size: 0.9em;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="checkmark">✅</div>
        <h1>You're in!</h1>
        <p>Taking you to the Avatar Video Generator now...</p>
        <div class="spinner"></div>
        <a class="manual-link" href="https://avatarpoc.streamlit.app/">Click here if you're not redirected</a>
    </div>
</body>
</html>
